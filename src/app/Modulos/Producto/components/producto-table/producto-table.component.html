@if (isLoading) {
    @for (i of [1, 2, 3, 4, 5]; track i) {
        <p-skeleton width="100%" height="3rem" styleClass="mb-2"></p-skeleton>
    }
} @else {
    <p-table
        [value]="productos"
        [paginator]="true"
        [rows]="10"
        responsiveLayout="scroll"
    >
        <ng-template pTemplate="header">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Stock</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-producto>
            <tr>
                <td>{{ producto.id }}</td>
                <td>{{ producto.nombre }}</td>
                <td>{{ producto.stock }}</td>
                <td>{{ producto.precio | currency }}</td>
                <td>
                    <p-button
                        icon="pi pi-pencil"
                        styleClass="p-button-rounded p-button-success mr-2"
                        (onClick)="asignarEdicion(producto)">
                    </p-button>
                    <p-button
                        icon="pi pi-trash"
                        styleClass="p-button-rounded p-button-warning"
                        (onClick)="asignarEliminacion(producto)">
                    </p-button>
                </td>
            </tr>
        </ng-template>
    </p-table>
}
