<p-table
    #dt
    [value]="productos"
    [lazy]="true"
    (onLazyLoad)="onLazyLoad($event)"
    [paginator]="true"
    [rows]="rows"
    [totalRecords]="totalRecords"
    [loading]="isLoading"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} registros"
    responsiveLayout="scroll"
>
    <ng-template pTemplate="caption">
        <div
            class="flex flex-column md:flex-row md:justify-content-between md:align-items-center"
        >
            <span class="block mt-2 md:mt-0 p-input-icon-left">
                <i class="pi pi-search"></i>
                <input
                    pInputText
                    type="text"
                    (keydown.enter)="onFilter($event, fields.Nombre, dt)"
                    (input)="onSearchInput($event, fields.Nombre, dt)"
                    placeholder="Buscar por nombre..."
                    class="w-full sm:w-auto"
                />
            </span>
            <span class="block mt-2 md:mt-0 p-input-icon-left ml-2">
                <i class="pi pi-filter"></i>
                <input
                    pInputText
                    type="number"
                    (keydown.enter)="onFilter($event, fields.StockMinimo, dt)"
                    (input)="onSearchInput($event, fields.StockMinimo, dt)"
                    placeholder="Stock Mínimo"
                    min="0"
                    class="w-full sm:w-auto"
                />
            </span>
            <span class="block mt-2 md:mt-0 ml-2">
                <p-calendar 
                    placeholder="Ingreso Hasta" 
                    dateFormat="dd/mm/yy"
                    (onSelect)="onFilterDate($event, fields.FechaIngresoHasta, dt)"
                    (onClear)="onFilterDate(null, fields.FechaIngresoHasta, dt)"
                    [showClear]="true"
                    class="w-full sm:w-auto">
                </p-calendar>
            </span>
            <span class="block mt-2 md:mt-0 ml-2">
                <p-dropdown 
                    [options]="bodegas" 
                    optionLabel="nombre" 
                    optionValue="id" 
                    placeholder="Seleccionar Bodega" 
                    [showClear]="true" 
                    (onChange)="onFilter($event, fields.BodegaId, dt)"
                    class="w-full sm:w-auto">
                </p-dropdown>
            </span>
        </div>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Bodega</th>
            <th>Stock</th>
            <th>Precio</th>
            <th>Fecha</th>
            <th>Acciones</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-producto>
        <tr>
            <td>{{ producto.id }}</td>
            <td>{{ producto.nombre }}</td>
            <td>{{ producto.bodegaNombre }}</td>
            <td>{{ producto.stock }}</td>
            <td>{{ producto.precio | currency }}</td>
            <td>{{ producto.fechaIngreso | date:'dd/MM/yyyy' }}</td>
            <td>
                <p-button
                    icon="pi pi-pencil"
                    styleClass="p-button-rounded p-button-success mr-2"
                    (onClick)="asignarEdicion(producto)"
                >
                </p-button>
                <p-button
                    icon="pi pi-trash"
                    styleClass="p-button-rounded p-button-warning"
                    (onClick)="asignarEliminacion(producto)"
                >
                </p-button>
            </td>
        </tr>
    </ng-template>
</p-table>
