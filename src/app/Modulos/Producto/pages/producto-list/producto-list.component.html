<div class="grid">
    <div class="col-12">
        <div class="card px-6 py-6">
            <div class="flex justify-content-between align-items-center mb-4">
                <h5 class="m-0">Gestión de Productos</h5>
                <p-button
                    label="Agregar Producto"
                    icon="pi pi-plus"
                    styleClass="p-button-success"
                >
                </p-button>
            </div>

            <div>
                <!-- Se inyecta el Dumb Component y se pasan properties y eventos -->
                <app-producto-table
                    [productos]="productos"
                    [isLoading]="isLoading"
                    [permissions]="permissions"
                    (actionClicked)="setAccionProducto($event)"
                >
                </app-producto-table>
            </div>
        </div>
    </div>
</div>
