<p-table
    #dt
    [value]="bodegas"
    [lazy]="true"
    (onLazyLoad)="onLazyLoad($event)"
    [paginator]="true"
    [rows]="rows"
    [totalRecords]="totalRecords"
    [loading]="isLoading"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} registros"
    responsiveLayout="scroll"
>
    <ng-template pTemplate="caption">
        <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-center">
            <span class="block mt-2 md:mt-0 p-input-icon-left">
                <i class="pi pi-search"></i>
                <input
                    pInputText
                    type="text"
                    (keydown.enter)="onFilter($event, 'nombre', dt)"
                    (input)="onSearchInput($event, dt)"
                    placeholder="Buscar por nombre..."
                    class="w-full sm:w-auto"
                />
            </span>
        </div>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-bodega>
        <tr>
            <td>{{ bodega.id }}</td>
            <td>{{ bodega.nombre }}</td>
            <td>{{ bodega.descripcion }}</td>
            <td>
                <p-button
                    icon="pi pi-pencil"
                    styleClass="p-button-rounded p-button-success mr-2"
                    (onClick)="asignarEdicion(bodega)"
                >
                </p-button>
                <p-button
                    icon="pi pi-trash"
                    styleClass="p-button-rounded p-button-warning"
                    (onClick)="asignarEliminacion(bodega)"
                >
                </p-button>
            </td>
        </tr>
    </ng-template>
</p-table>
